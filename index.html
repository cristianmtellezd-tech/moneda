<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Conversor Pro+</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding: 25px;
    border-radius: 20px;
    width: 380px;
    text-align: center;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1;}
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

input, select {
    background: rgba(255,255,255,0.2);
    color: white;
}

button {
    background: #00c6ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
    color: white;
}

.images {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

.images div {
    width: 45%;
}

img {
    width: 100%;
    height: 70px;
    border-radius: 10px;
    display: none;
    transition: transform 0.4s;
}

img.active {
    display: block;
    transform: scale(1.05);
}

#resultado {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}

.loader {
    display: none;
}
</style>
</head>

<body>

<div class="card">
    <h2>💱 Conversor PRO+</h2>

    <input type="number" id="cantidad" placeholder="Cantidad">

    <select id="origen"></select>
    <select id="destino"></select>

    <button onclick="convertir()">Convertir</button>
    <button onclick="swap()">🔄 Intercambiar</button>

    <div class="images">
        <div>
            <img id="imgOrigen">
            <p id="nombreOrigen"></p>
        </div>
        <div>
            <img id="imgDestino">
            <p id="nombreDestino"></p>
        </div>
    </div>

    <div class="loader" id="loader">⏳ Consultando tasa...</div>
    <div id="resultado"></div>
</div>

<script>

const monedas = ["COP","USD","EUR","GBP","JPY","MXN","BRL","ARS","CAD","CHF"];

const nombres = {
    COP:"Colombia", USD:"EE.UU", EUR:"Europa", GBP:"Reino Unido",
    JPY:"Japón", MXN:"México", BRL:"Brasil", ARS:"Argentina",
    CAD:"Canadá", CHF:"Suiza"
};

const banderas = {
    COP:"https://flagcdn.com/w80/co.png",
    USD:"https://flagcdn.com/w80/us.png",
    EUR:"https://flagcdn.com/w80/eu.png",
    GBP:"https://flagcdn.com/w80/gb.png",
    JPY:"https://flagcdn.com/w80/jp.png",
    MXN:"https://flagcdn.com/w80/mx.png",
    BRL:"https://flagcdn.com/w80/br.png",
    ARS:"https://flagcdn.com/w80/ar.png",
    CAD:"https://flagcdn.com/w80/ca.png",
    CHF:"https://flagcdn.com/w80/ch.png"
};

// llenar selects automáticamente
const origen = document.getElementById("origen");
const destino = document.getElementById("destino");

monedas.forEach(m => {
    origen.innerHTML += `<option value="${m}">${m}</option>`;
    destino.innerHTML += `<option value="${m}">${m}</option>`;
});

// eventos
origen.addEventListener("change", actualizarUI);
destino.addEventListener("change", actualizarUI);
document.getElementById("cantidad").addEventListener("input", convertir);

function actualizarUI(){
    actualizarImagen("origen");
    actualizarImagen("destino");
}

function actualizarImagen(tipo){
    let moneda = document.getElementById(tipo).value;
    let img = document.getElementById("img"+capitalize(tipo));

    if(moneda){
        img.src = banderas[moneda];
        img.classList.add("active");
        document.getElementById("nombre"+capitalize(tipo)).innerText = nombres[moneda];
    }
}

function capitalize(txt){
    return txt.charAt(0).toUpperCase()+txt.slice(1);
}

// API REAL
async function convertir(){
    let cantidad = document.getElementById("cantidad").value;
    let from = origen.value;
    let to = destino.value;

    if(!cantidad || !from || !to) return;

    document.getElementById("loader").style.display = "block";

    try {
        let res = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
        let data = await res.json();

        let tasa = data.rates[to];
        let resultado = cantidad * tasa;

        document.getElementById("resultado").innerText =
            `${formatear(cantidad)} ${from} = ${formatear(resultado)} ${to}`;

        sonido();

    } catch {
        document.getElementById("resultado").innerText = "Error de conexión";
    }

    document.getElementById("loader").style.display = "none";
}

// formato bonito
function formatear(num){
    return new Intl.NumberFormat().format(num);
}

// sonido
function sonido(){
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
    audio.play();
}

// swap
function swap(){
    let temp = origen.value;
    origen.value = destino.value;
    destino.value = temp;
    actualizarUI();
    convertir();
}

</script>

</body>
</html>
